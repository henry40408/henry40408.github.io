version: 2

jobs:
  build:
    branches:
      only:
        - develop
    docker:
      - image: circleci/node:carbon
    steps:
      - checkout
      - restore_cache:
          key: npm-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          key: npm-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run: |
          git config --global user.email 'sayhi@circleci.com'
          git config --global user.name 'CircleCI'
      - run: npm run deploy
