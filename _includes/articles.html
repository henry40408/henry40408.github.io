<div class="row">
  <div class="column">
    <section>
      <h2>Posts</h2>
      <ul class="ui article list">
      {% for post in site.posts %}
        <li class="item"><a href="{{ post.url | relative_url }}">{{ post.title }}</a>{% include short_essay.html post=post %} &mdash; <time datetime="{{ post.date }}">{{ post.date | date: site.date_format }}</time></li>
      {% endfor %}
      </ul>
    </section>
  </div>
</div>
