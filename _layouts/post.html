---
layout: default
---
{% assign post = page %}
<div class="row">
  <div class="column">
    <h1>{{ page.title }}</h1>
    <p>{% include short_essay.html %} Posted on <time datetime="{{ page.date }}">{{ page.date | date: site.date_format }}</time>, tagged with {{ page | tags }}</p>
    <div class="single post">{{ content }}</div>
    {% include disqus-comments.html %}
  </div>
</div>
