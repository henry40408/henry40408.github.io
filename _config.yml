# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Life is a YOLO Game
subtitle: so play it well
description:
keywords:
author: Heng-Yi Wu
language: zh-TW
timezone: Asia/Taipei

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://henry40408.com
root: /
permalink: :title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 0
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next
theme_config:
  scheme: Pisces
  motion:
    enable: false
  social:
    GitHub: https://github.com/henry40408 || github
    Medium: https://medium.com/@henry40408 || medium
    LinkedIn: https://www.linkedin.com/in/henry40408/ || linkedin
    Resume: https://www.cakeresume.com/henry40408 || file-text
  social_icons:
    enable: true
    icons_only: true
  github_banner:
    enable: true
    permalink: https://github.com/henry40408
  exturl: true
  # Local search
  # Dependencies: https://github.com/theme-next/hexo-generator-searchdb
  local_search:
    enable: true
    # if auto, trigger search by changing input
    # if manual, trigger search by pressing enter key or search button
    trigger: auto
    # show top n results per article, show all results by setting to -1
    top_n_per_article: 1
    # unescape html strings to the readable one
    unescape: false
  # Google Analytics
  google_analytics:
    tracking_id: UA-6529501-15
    localhost_ignored: true
  commento:
    enable: true
  # For example, you want to put your custom styles file
  # outside theme directory in root `source/_data`, set
  # `styles: source/_data/styles.styl`
  custom_file_path:
    # Default paths: layout/_custom/*
    head: source/_data/head.swig
    #header: source/_data/header.swig
    #sidebar: source/_data/sidebar.swig

    # Default path: source/css/_variables/custom.styl
    #variables: source/_data/variables.styl
    # Default path: source/css/_mixins/custom.styl
    #mixins: source/_data/mixins.styl
    # Default path: source/css/_custom/custom.styl
    #styles: source/_data/styles.styl
  creative_commons:
    license: by-nc-nd
    sidebar: true
    post: true
    language: deed.zh_TW
  favicon:
    small: /images/favicon-16x16.png
    medium: /images/favicon-32x32.png
    apple_touch_icon: /images/apple-touch-icon.png
    safari_pinned_tab: /images/safari-pinned-tab.svg
    android_manifest: /images/site.webmanifest
    ms_browserconfig: /images/browserconfig.xml
  avatar:
    url: /images/avatar.jpg
    rounded: true
  scroll_to_more: true
  save_scroll: true

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type:

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit:
  content_limit_delim: ' '

search:
  path: search.xml
  field: post
  format: html
  limit: 10000
  
# hexo-generator-amp 
# The following settings is the quick start options. 
 
generator_amp:
  templateDir: amp-template
  assetDistDir: amp-dist
  logo:
    path: avatar.png
    width: 180
    height: 180
  substituteTitleImage:
    path: life-is-a-yolo-game-so-play-it-well.png
    width: 1200
    height: 630
  warningLog: false   # To display warning, please set true.
